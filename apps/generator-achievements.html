<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成就系統 — 程式碼產生器</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{ font-size:1rem; }   /* root = 16px; all text >= 1rem */

:root{
  --bg:#0c0d0c;  --surface:#111211;  --surface2:#181918;
  --border:#2a2b28; --border2:#1e1f1e;
  --text:#c6c7bd;   --text-sec:#8a8b88;
  --special:#C8DD5A;  --info:#90CDF4;   --attention:#E5E5A6;
  --warning:#F08080;  --safe:#81E6D9;   --lavender:#C3A5E5;
  --orange:#f69653;   --pink:#FFB3D9;
}

body{
  background:var(--bg); color:var(--text);
  font-family:'Exo 2','Segoe UI',system-ui,sans-serif;
  font-size:1rem; min-height:100vh;
  display:flex; flex-direction:column;
}

/* ── App Header ───────────────────────────────────────────────── */
.app-hdr{
  background:var(--surface); border-bottom:1px solid var(--border2);
  padding:12px 22px; display:flex; align-items:center;
  justify-content:space-between; gap:14px; flex-shrink:0; flex-wrap:wrap;
}
.app-hdr-brand{ display:flex; align-items:center; gap:9px; }
.app-hdr-brand i{ color:var(--special); font-size:1.15rem; }
.app-hdr-title{
  font-size:1.1rem; font-weight:800; color:var(--text); letter-spacing:-.01em;
  display:flex; align-items:center; gap:8px;
}
.saved-dot{
  width:7px; height:7px; border-radius:50%;
  background:var(--safe); display:inline-block;
  opacity:0; transition:opacity .3s;
}
.saved-dot.show{ opacity:1; }
.app-hdr-sub{
  font-size:1rem; font-family:'Share Tech Mono',monospace;
  color:var(--text-sec);
}
.hdr-btns{ display:flex; gap:7px; flex-wrap:wrap; }

/* ── App Body ─────────────────────────────────────────────────── */
.app-body{
  display:flex; flex:1; overflow:hidden; min-height:0;
}

/* ── Sidebar ──────────────────────────────────────────────────── */
.app-sidebar{
  width:420px; flex-shrink:0;
  background:var(--surface); border-right:1px solid var(--border2);
  display:flex; flex-direction:column;
  overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}

/* ── Main ─────────────────────────────────────────────────────── */
.app-main{
  flex:1; display:flex; flex-direction:column;
  overflow:hidden; min-height:0;
}
.code-area{
  flex:1; display:flex; flex-direction:column;
  overflow:hidden; border-bottom:1px solid var(--border2);
}
.test-area{
  height:240px; flex-shrink:0;
  display:flex; flex-direction:column; overflow:hidden;
}

/* ── Section ──────────────────────────────────────────────────── */
.section{ border-bottom:1px solid var(--border2); padding:16px 18px; }
.section-title{
  font-size:1rem; font-weight:700; color:var(--special);
  text-transform:uppercase; letter-spacing:.1em;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.section-title-left{ display:flex; align-items:center; gap:7px; }

/* ── Form ─────────────────────────────────────────────────────── */
label{
  font-size:1rem; color:var(--text-sec);
  display:block; margin-bottom:4px;
}
input[type=text], input[type=number], select, textarea{
  width:100%; background:var(--bg); border:1.5px solid var(--border);
  border-radius:6px; padding:8px 11px; font-size:1rem;
  font-family:'Exo 2',sans-serif; color:var(--text); outline:none;
  transition:border-color .15s;
}
input[type=text]:focus, input[type=number]:focus,
select:focus, textarea:focus{ border-color:var(--info); }
select option{ background:var(--surface); }
textarea{ resize:vertical; font-family:'Exo 2',sans-serif; }
.form-row{ display:grid; gap:10px; margin-bottom:10px; }
.g2{ grid-template-columns:1fr 1fr; }
.g3{ grid-template-columns:1fr 1fr 1fr; }
.g4{ grid-template-columns:1fr 1fr 1fr 1fr; }
.form-group{ display:flex; flex-direction:column; gap:4px; }
.check-row{
  display:flex; align-items:center; gap:8px; cursor:pointer;
  font-size:1rem; color:var(--text); user-select:none;
}
.check-row input[type=checkbox]{
  width:16px; height:16px; cursor:pointer; accent-color:var(--info);
}

/* ── Buttons ──────────────────────────────────────────────────── */
.btn{
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 14px; border-radius:6px;
  border:1.5px solid var(--border); background:var(--surface2);
  color:var(--text-sec); font-size:1rem;
  font-family:'Exo 2',sans-serif; font-weight:600;
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.btn:hover{ border-color:var(--info); color:var(--info); }
.btn-primary{
  background:var(--info); border-color:var(--info);
  color:#0c0d0c; font-weight:700;
}
.btn-primary:hover{ filter:brightness(1.1); color:#0c0d0c; }
.btn-danger:hover{ border-color:var(--warning); color:var(--warning); }
.btn-dl:hover{ border-color:var(--safe); color:var(--safe); }
.btn-sm{ padding:5px 10px; }

/* ── Theme Swatches ───────────────────────────────────────────── */
.theme-grid{ display:flex; gap:10px; flex-wrap:wrap; }
.theme-swatch-wrap{ display:flex; flex-direction:column; align-items:center; gap:4px; }
.theme-swatch{
  width:38px; height:38px; border-radius:9px;
  border:2.5px solid transparent; cursor:pointer;
  transition:transform .15s, border-color .15s; padding:0;
}
.theme-swatch:hover{ transform:scale(1.12); }
.theme-swatch.active{ border-color:#fff; }
.theme-swatch-label{
  font-size:1rem; color:var(--text-sec);
  font-family:'Share Tech Mono',monospace; text-align:center;
}

/* ── Rarity label inputs ──────────────────────────────────────── */
.rl-label{ display:flex; align-items:center; gap:5px; margin-bottom:4px; font-size:1rem; }

/* ── Achievement Cards ────────────────────────────────────────── */
.ach-list{ display:flex; flex-direction:column; gap:8px; }
.ach-card{
  background:var(--bg); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px;
  display:flex; align-items:center; gap:10px;
  cursor:grab;
}
.ach-card:hover{ border-color:var(--border2); background:var(--surface2); }
.ach-card.drag-over{ border-color:var(--info); background:#0e1420; }
.ach-icon{
  width:38px; height:38px; border-radius:7px;
  border:1.5px solid; display:flex; align-items:center;
  justify-content:center; font-size:1.05rem; flex-shrink:0;
  background:#0c0d0c;
}
.ach-body{ flex:1; min-width:0; }
.ach-name{
  font-size:1rem; font-weight:700; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ach-meta{ display:flex; gap:5px; align-items:center; margin-top:3px; flex-wrap:wrap; }
.badge{
  font-size:1rem; padding:1px 7px; border-radius:4px;
  font-family:'Share Tech Mono',monospace; border:1px solid;
}
.ach-actions{ display:flex; gap:4px; flex-shrink:0; }

/* ── Code Panel ───────────────────────────────────────────────── */
.panel-hdr{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px; border-bottom:1px solid var(--border2);
  background:var(--surface); flex-shrink:0;
}
.panel-hdr-title{
  font-size:1rem; font-weight:700; color:var(--text);
  display:flex; align-items:center; gap:7px;
}
.panel-hdr-title i{ color:var(--info); }
.code-body{
  flex:1; overflow-y:auto; padding:16px 18px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
pre.code-block{
  font-family:'Share Tech Mono',monospace; font-size:1rem;
  line-height:1.65; color:var(--text-sec); white-space:pre; margin:0;
}
.ct{ color:var(--info); }
.ca{ color:var(--attention); }
.cv{ color:var(--safe); }
.cc{ color:#3a3b38; font-style:italic; }
.copy-ok{ font-size:1rem; color:var(--safe); opacity:0; transition:opacity .3s; }
.copy-ok.show{ opacity:1; }

/* ── Test Panel ───────────────────────────────────────────────── */
.test-body{
  padding:12px 16px; overflow-y:auto; flex:1;
  display:flex; flex-direction:column; gap:10px;
}
.test-grid{ display:flex; flex-wrap:wrap; gap:7px; }
.test-btn{
  display:inline-flex; align-items:center; gap:6px;
  padding:7px 12px; border-radius:6px;
  border:1.5px solid var(--border); background:var(--surface2);
  color:var(--text-sec); font-size:1rem;
  font-family:'Exo 2',sans-serif; cursor:pointer; transition:all .15s;
}
.test-btn:hover:not(:disabled){ border-color:var(--special); color:var(--special); }
.test-btn:disabled{ opacity:.45; cursor:not-allowed; border-color:var(--attention); color:var(--attention); }
.log-box{
  display:flex; flex-direction:column; gap:1px;
  max-height:64px; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.log-entry{
  font-size:1rem; font-family:'Share Tech Mono',monospace;
  color:var(--safe); padding:1px 0;
}

/* ── Modal ────────────────────────────────────────────────────── */
.modal-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.72);
  z-index:9995; display:none; align-items:center;
  justify-content:center; padding:20px;
}
.modal-overlay.open{ display:flex; }
.modal{
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:24px; width:100%; max-width:560px;
  max-height:90vh; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.modal-title{
  font-size:1.1rem; font-weight:800; color:var(--text);
  display:flex; align-items:center; gap:8px; margin-bottom:20px;
}
.modal-title i{ color:var(--special); }
.modal-footer{
  display:flex; justify-content:flex-end; gap:8px;
  margin-top:20px; padding-top:16px; border-top:1px solid var(--border2);
}
.icon-preview{
  display:flex; align-items:center; gap:9px;
}
.icon-preview-box{
  width:40px; height:40px; border-radius:8px;
  background:var(--bg); border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; flex-shrink:0; transition:border-color .2s;
}
.empty-hint{
  font-size:1rem; color:var(--text-sec); text-align:center;
  padding:20px 0; font-family:'Share Tech Mono',monospace;
}
.divider{ height:1px; background:var(--border2); margin:12px 0; }
.err-msg{ font-size:1rem; color:var(--warning); margin-top:4px; display:none; }
.err-msg.show{ display:block; }
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="app-hdr">
  <div class="app-hdr-brand">
    <i class="bi bi-award-fill"></i>
    <div>
      <div class="app-hdr-title">
        成就系統 — 程式碼產生器
        <span class="saved-dot" id="saved-dot"></span>
      </div>
      <div class="app-hdr-sub">achievement-system.js  ·  宣告式 HTML  ·  localStorage 暫存</div>
    </div>
  </div>
  <div class="hdr-btns">
    <button class="btn btn-dl" onclick="downloadHTML()"><i class="bi bi-download"></i> 下載完整 HTML</button>
    <button class="btn btn-danger" onclick="resetAll()"><i class="bi bi-trash3"></i> 清除重置</button>
  </div>
</header>

<!-- ── Body ── -->
<div class="app-body">

  <!-- ════════ SIDEBAR ════════ -->
  <aside class="app-sidebar">

    <!-- System Settings -->
    <div class="section">
      <div class="section-title">
        <span class="section-title-left"><i class="bi bi-gear-fill"></i> 系統設定</span>
      </div>

      <div class="form-group" style="margin-bottom:14px">
        <label>主題</label>
        <div class="theme-grid" id="theme-grid"></div>
      </div>

      <div class="form-row g2">
        <div class="form-group">
          <label>觸發按鈕位置</label>
          <select id="s-triggerPos" onchange="onSettingChange()">
            <option value="bottom-right">右下角</option>
            <option value="bottom-left">左下角</option>
            <option value="top-left">左上角</option>
          </select>
        </div>
        <div class="form-group">
          <label>觸發按鈕大小 (px)</label>
          <input type="number" id="s-triggerSize" min="32" max="96" oninput="onSettingChange()">
        </div>
      </div>

      <div class="form-row g2">
        <div class="form-group">
          <label>面板方向</label>
          <select id="s-panelSide" onchange="onSettingChange()">
            <option value="right">右側滑出</option>
            <option value="left">左側滑出</option>
          </select>
        </div>
        <div class="form-group">
          <label>面板寬度 (px)</label>
          <input type="number" id="s-panelWidth" min="180" max="700" oninput="onSettingChange()">
        </div>
      </div>

      <div class="form-row g2">
        <div class="form-group">
          <label>Toast 位置</label>
          <select id="s-toastPosition" onchange="onSettingChange()">
            <option value="top-right">右上</option>
            <option value="top-left">左上</option>
            <option value="bottom-right">右下</option>
            <option value="bottom-left">左下</option>
          </select>
        </div>
        <div class="form-group">
          <label>Toast 寬度 (px)</label>
          <input type="number" id="s-toastWidth" min="160" max="500" oninput="onSettingChange()">
        </div>
      </div>

      <div class="form-row g2">
        <div class="form-group">
          <label>Toast 時長 (ms)</label>
          <input type="number" id="s-toastDuration" min="500" max="12000" step="100" oninput="onSettingChange()">
        </div>
        <div class="form-group">
          <label>傳說 Toast 時長 (ms)</label>
          <input type="number" id="s-toastDurationLeg" min="500" max="15000" step="100" oninput="onSettingChange()">
        </div>
      </div>

      <div class="form-row g2" style="margin-bottom:14px">
        <div class="form-group">
          <label>整體縮放</label>
          <input type="number" id="s-scale" min="0.5" max="2" step="0.05" oninput="onSettingChange()">
        </div>
        <div class="form-group" style="justify-content:flex-end; padding-bottom:4px">
          <label class="check-row" style="margin-top:auto">
            <input type="checkbox" id="s-showList" onchange="onSettingChange()">
            顯示成就清單
          </label>
        </div>
      </div>

      <div class="form-group">
        <label style="margin-bottom:8px">稀有度標籤文字</label>
        <div class="form-row g4">
          <div class="form-group">
            <div class="rl-label" style="color:#c6c7bd">
              <span style="width:8px;height:8px;border-radius:50%;background:#c6c7bd;display:inline-block"></span>普通
            </div>
            <input type="text" id="rl-common" oninput="onSettingChange()">
          </div>
          <div class="form-group">
            <div class="rl-label" style="color:#90CDF4">
              <span style="width:8px;height:8px;border-radius:50%;background:#90CDF4;display:inline-block"></span>稀有
            </div>
            <input type="text" id="rl-rare" oninput="onSettingChange()">
          </div>
          <div class="form-group">
            <div class="rl-label" style="color:#C3A5E5">
              <span style="width:8px;height:8px;border-radius:50%;background:#C3A5E5;display:inline-block"></span>史詩
            </div>
            <input type="text" id="rl-epic" oninput="onSettingChange()">
          </div>
          <div class="form-group">
            <div class="rl-label" style="color:#C8DD5A">
              <span style="width:8px;height:8px;border-radius:50%;background:#C8DD5A;display:inline-block"></span>傳說
            </div>
            <input type="text" id="rl-legendary" oninput="onSettingChange()">
          </div>
        </div>
      </div>
    </div><!-- /section -->

    <!-- Achievement List -->
    <div class="section" style="flex:1">
      <div class="section-title">
        <span class="section-title-left">
          <i class="bi bi-list-check"></i> 成就清單
          <span id="ach-count" style="font-size:1rem;color:var(--text-sec);font-family:'Share Tech Mono',monospace">(0)</span>
        </span>
        <button class="btn btn-primary btn-sm" onclick="openModal(null)">
          <i class="bi bi-plus-lg"></i> 新增成就
        </button>
      </div>
      <div class="ach-list" id="ach-list">
        <div class="empty-hint">尚無成就 — 點擊「新增成就」開始</div>
      </div>
    </div>

  </aside><!-- /sidebar -->

  <!-- ════════ MAIN ════════ -->
  <main class="app-main">

    <!-- Code Output -->
    <div class="code-area">
      <div class="panel-hdr">
        <div class="panel-hdr-title"><i class="bi bi-code-slash"></i> 生成程式碼</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="copy-ok" id="copy-ok"><i class="bi bi-check-circle-fill"></i> 已複製</span>
          <button class="btn btn-sm" onclick="copyCode()"><i class="bi bi-clipboard"></i> 複製</button>
        </div>
      </div>
      <div class="code-body">
        <pre class="code-block" id="code-block"><span style="color:var(--text-sec);font-family:'Share Tech Mono',monospace">新增成就後程式碼將自動產生…</span></pre>
      </div>
    </div>

    <!-- Live Test -->
    <div class="test-area">
      <div class="panel-hdr">
        <div class="panel-hdr-title"><i class="bi bi-play-circle-fill"></i> 即時測試</div>
        <button class="btn btn-sm" onclick="resetPreview()"><i class="bi bi-arrow-counterclockwise"></i> 重置</button>
      </div>
      <div class="test-body">
        <div class="test-grid" id="test-grid">
          <span style="font-size:1rem;color:var(--text-sec);font-family:'Share Tech Mono',monospace">新增成就後可點擊此處觸發測試</span>
        </div>
        <div class="log-box" id="log-box"></div>
      </div>
    </div>

  </main>

</div><!-- /app-body -->

<!-- ── Modal ── -->
<div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">
      <i class="bi bi-award-fill"></i>
      <span id="modal-title-text">新增成就</span>
    </div>

    <div class="form-row g2">
      <div class="form-group">
        <label>ID（唯一識別碼）</label>
        <input type="text" id="m-id" placeholder="my-achievement" oninput="clearErr()">
        <span class="err-msg" id="err-id">ID 不可為空或重複</span>
      </div>
      <div class="form-group">
        <label>稀有度</label>
        <select id="m-rarity" onchange="updateIconPreview()">
          <option value="common">普通 common</option>
          <option value="rare">稀有 rare</option>
          <option value="epic">史詩 epic</option>
          <option value="legendary">傳說 legendary</option>
        </select>
      </div>
    </div>

    <div class="form-group" style="margin-bottom:10px">
      <label>Bootstrap Icons class（圖示）</label>
      <div class="icon-preview">
        <div class="icon-preview-box" id="icon-preview-box">
          <i class="bi bi-award-fill" id="icon-preview-i"></i>
        </div>
        <input type="text" id="m-icon" placeholder="bi-award-fill"
          oninput="updateIconPreview()" style="flex:1">
      </div>
    </div>

    <div class="form-group" style="margin-bottom:10px">
      <label>成就名稱</label>
      <input type="text" id="m-title" placeholder="成就名稱" oninput="clearErr()">
      <span class="err-msg" id="err-title">名稱不可為空</span>
    </div>

    <div class="form-group" style="margin-bottom:10px">
      <label>描述</label>
      <textarea id="m-desc" rows="3" placeholder="成就描述文字"></textarea>
    </div>

    <div class="form-row g2">
      <div class="form-group">
        <label>獎勵文字（選填）</label>
        <input type="text" id="m-reward" placeholder="例：+ 1 點">
      </div>
      <div class="form-group">
        <label style="visibility:hidden">.</label>
        <div style="display:flex;flex-direction:column;gap:10px;padding-top:2px">
          <label class="check-row">
            <input type="checkbox" id="m-spoiler"> spoiler（未解鎖顯示「???」）
          </label>
          <label class="check-row">
            <input type="checkbox" id="m-secret"> secret（面板完全隱藏）
          </label>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveAchievement()">
        <i class="bi bi-check-lg"></i> 儲存
      </button>
    </div>
  </div>
</div>

<!-- ── achievement-system.js (inlined) ── -->
<script>(function (G) {
  'use strict';

  function deepMerge(target) {
    for (var i=1;i<arguments.length;i++) {
      var src=arguments[i];
      if (!src||typeof src!=='object') continue;
      Object.keys(src).forEach(function(k){
        if (src[k]!==null&&!Array.isArray(src[k])&&typeof src[k]==='object') {
          if (typeof target[k]!=='object'||target[k]===null) target[k]={};
          deepMerge(target[k],src[k]);
        } else if (src[k]!==undefined) target[k]=src[k];
      });
    }
    return target;
  }

  function scaleRem(val,factor) {
    var m=String(val).match(/^([\d.]+)(rem|em|px)$/);
    if (!m||factor===1) return val;
    return (parseFloat(m[1])*factor).toFixed(3)+m[2];
  }

  // ── Built-in themes ────────────────────────────────────────────────
  var _THEMES = {
    default: { accent:'#C8DD5A', accentText:'#0c0d0c', progressBg:'#C8DD5A', triggerColor:'#C8DD5A',
               panelBg:'#0e0f0e', panelBorder:'#1e1f1e', headerColor:'#c6c7bd', toastBorder:'#1e1f1e' },
    ocean:   { accent:'#04b5a3', accentText:'#0c0d0c', progressBg:'#81E6D9', triggerColor:'#04b5a3',
               panelBg:'#080f0e', panelBorder:'#0e2020', headerColor:'#81E6D9', toastBorder:'#0e2020' },
    ember:   { accent:'#f69653', accentText:'#0c0d0c', progressBg:'#d9b375', triggerColor:'#f69653',
               panelBg:'#0f0a06', panelBorder:'#2a1808', headerColor:'#d9b375', toastBorder:'#2a1808' },
    violet:  { accent:'#C3A5E5', accentText:'#0c0d0c', progressBg:'#FFB3D9', triggerColor:'#C3A5E5',
               panelBg:'#0c0810', panelBorder:'#1e1430', headerColor:'#FFB3D9', toastBorder:'#1e1430' },
    nature:  { accent:'#C8DD5A', accentText:'#0c0d0c', progressBg:'#81E6D9', triggerColor:'#81E6D9',
               panelBg:'#080e08', panelBorder:'#0e2010', headerColor:'#C8DD5A', toastBorder:'#0e2010' },
    blood:   { accent:'#F08080', accentText:'#0c0d0c', progressBg:'#E5C3B3', triggerColor:'#F08080',
               panelBg:'#0f0808', panelBorder:'#2a1010', headerColor:'#E5C3B3', toastBorder:'#2a1010' },
  };

  // ── Rarity config ─────────────────────────────────────────────────
  var RARITIES = {
    common:    { label:'普通', color:'#c6c7bd', glow:'rgba(198,199,189,.22)' },
    rare:      { label:'稀有', color:'#90CDF4', glow:'rgba(144,205,244,.30)' },
    epic:      { label:'史詩', color:'#C3A5E5', glow:'rgba(195,165,229,.30)' },
    legendary: { label:'傳說', color:'#C8DD5A', glow:'rgba(200,221,90,.36)'  },
  };

  // ── Defaults ──────────────────────────────────────────────────────
  var _D = {
    showList: true,
    panelSide: 'right',
    panelWidth: 280,
    triggerPos: 'bottom-left',
    triggerSize: 46,
    toastWidth: 270,
    toastPosition: 'top-right',
    toastDuration: { common: 3200, rare: 3200, epic: 3200, legendary: 4500 },
    rarityLabels: { common:'普通', rare:'稀有', epic:'史詩', legendary:'傳說' },
    achievements: [],
    onUnlock: null,
    themeName: 'default',
    scale: 1,
    typography: {
      panelTitle:  '0.86rem',
      panelItem:   '0.80rem',
      panelDesc:   '0.70rem',
      panelMeta:   '0.63rem',
      toastTitle:  '0.86rem',
      toastDesc:   '0.70rem',
      toastEyebrow:'0.62rem',
      progressLabel:'0.66rem',
    },
  };

  // ╔═══════════════════════════════════════════════════════╗
  // ║  AchievementSystem                                    ║
  // ╚═══════════════════════════════════════════════════════╝
  function AchievementSystem(options) {
    options = options || {};
    var name      = options.themeName || (G.AchievementConfig&&G.AchievementConfig.themeName) || 'default';
    var themeData = AchievementSystem.themes[name] || AchievementSystem.themes['default'];

    this.cfg = deepMerge({}, _D, themeData ? { _themeData: themeData } : {}, G.AchievementConfig||{}, options);
    this._theme = deepMerge({}, _THEMES['default'], themeData||{});
    this.cfg.themeName = name;

    this._achievements = (options.achievements||[]).map(function(a){ return Object.assign({},a,{_unlocked:false,_unlockedAt:null}); });
    this._map = {};
    this._achievements.forEach(function(a){ this._map[a.id]=a; }, this);
    this._panelOpen = false;

    AchievementSystem._injectCSS();
    var self = this;
    if (document.readyState==='loading') document.addEventListener('DOMContentLoaded',function(){ self._mount(); });
    else this._mount();
  }

  AchievementSystem.themes = _THEMES;
  AchievementSystem.registerTheme = function(name,cfg) { AchievementSystem.themes[name]=cfg; };

  // ── API ────────────────────────────────────────────────────────────
  AchievementSystem.prototype.check = function(ctx) {
    var newly=[], self=this;
    this._achievements.forEach(function(a){
      if (a._unlocked) return;
      var met=false;
      try { if (typeof a.condition==='function') met=!!a.condition(ctx); } catch(_){}
      if (met) { self._doUnlock(a,ctx); newly.push(a.id); }
    });
    if (newly.length) this._refreshPanel();
    return newly;
  };

  AchievementSystem.prototype.unlock = function(id) {
    var a=this._map[id]; if(a&&!a._unlocked){ this._doUnlock(a,{}); this._refreshPanel(); }
  };

  AchievementSystem.prototype.isUnlocked  = function(id) { return !!(this._map[id]&&this._map[id]._unlocked); };
  AchievementSystem.prototype.getAll      = function()   { return this._achievements.map(function(a){return Object.assign({},a);}); };
  AchievementSystem.prototype.getUnlocked = function()   { return this._achievements.filter(function(a){return a._unlocked;}).map(function(a){return Object.assign({},a);}); };
  AchievementSystem.prototype.showPanel   = function()   { this._panelOpen=true;  this._syncPanel(); };
  AchievementSystem.prototype.hidePanel   = function()   { this._panelOpen=false; this._syncPanel(); };
  AchievementSystem.prototype.togglePanel = function()   { this._panelOpen=!this._panelOpen; this._syncPanel(); };

  AchievementSystem.prototype.setShowList = function(v) { this.cfg.showList=!!v; this._refreshPanel(); };

  AchievementSystem.prototype.setPanelWidth = function(px) {
    this.cfg.panelWidth = px;
    if (this._panelEl) this._panelEl.style.width = px + 'px';
  };

  AchievementSystem.prototype.setTheme = function(name) {
    var t=AchievementSystem.themes[name];
    if (!t) { console.warn('AchievementSystem: unknown theme "'+name+'"'); return; }
    this._theme = deepMerge({}, _THEMES['default'], t);
    this.cfg.themeName=name;
    this._refreshPanel();
    if (this._triggerEl) {
      this._triggerEl.style.color=this._theme.triggerColor;
      this._triggerEl.style.borderColor=this._theme.panelBorder;
    }
  };

  AchievementSystem.prototype.setScale = function(s) { this.cfg.scale=s; this._refreshPanel(); };
  AchievementSystem.prototype.setTypography = function(t) { deepMerge(this.cfg.typography,t); this._refreshPanel(); };

  /**
   * Export all achievement states as a plain object (JSON-serialisable).
   * Shape:
   *   {
   *     version:      1,
   *     exportedAt:  "2026-03-14T10:00:00.000Z",
   *     themeName:   "ocean",
   *     achievements: [
   *       { id, title, rarity, unlocked, unlockedAt }
   *     ]
   *   }
   * Usage:
   *   var json = JSON.stringify(ach.exportState());
   *   // POST to PHP: fetch('/save.php', { method:'POST', body: json })
   */
  AchievementSystem.prototype.exportState = function() {
    return {
      version:      1,
      exportedAt:   new Date().toISOString(),
      themeName:    this.cfg.themeName,
      achievements: this._achievements.map(function(a) {
        return {
          id:         a.id,
          title:      a.title,
          rarity:     a.rarity || 'common',
          unlocked:   !!a._unlocked,
          unlockedAt: a._unlockedAt ? a._unlockedAt.toISOString() : null,
        };
      }),
    };
  };

  /**
   * Restore a previously exported state.
   * Silently restores unlocked/unlockedAt without re-triggering toasts or onUnlock.
   * @param {Object} state  — output of exportState() or parsed PHP response
   */
  AchievementSystem.prototype.importState = function(state) {
    if (!state || !Array.isArray(state.achievements)) return;
    var self = this;
    state.achievements.forEach(function(saved) {
      var a = self._map[saved.id];
      if (!a) return;
      a._unlocked   = !!saved.unlocked;
      a._unlockedAt = saved.unlockedAt ? new Date(saved.unlockedAt) : null;
    });
    this._refreshPanel();
  };

  AchievementSystem.prototype.destroy = function() {
    if(this._triggerEl)this._triggerEl.remove();
    if(this._panelEl)this._panelEl.remove();
    if(this._toastEl)this._toastEl.remove();
  };

  // ── Helpers ────────────────────────────────────────────────────────
  AchievementSystem.prototype._fs = function(key) {
    var v=this.cfg.typography&&this.cfg.typography[key]||_D.typography[key];
    return scaleRem(v, this.cfg.scale||1);
  };

  // Rarity helper: merges static colour/glow with configurable label
  AchievementSystem.prototype._r = function(rarityKey) {
    var base   = RARITIES[rarityKey] || RARITIES.common;
    var labels = (this.cfg.rarityLabels) || _D.rarityLabels;
    return { label: labels[rarityKey] || base.label, color: base.color, glow: base.glow };
  };

  AchievementSystem.prototype._mount = function() {
    this._buildToasts();
    this._buildTrigger();
    this._buildPanel();
  };

  AchievementSystem.prototype._doUnlock = function(a, ctx) {
    a._unlocked=true; a._unlockedAt=new Date();
    this._showToast(a);
    if (this.cfg.onUnlock) this.cfg.onUnlock(Object.assign({},a), ctx);
  };

  // ── Trigger ────────────────────────────────────────────────────────
  AchievementSystem.prototype._buildTrigger = function() {
    var pos  = this.cfg.triggerPos  || 'bottom-left';
    var size = (this.cfg.triggerSize || 46) + 'px';
    var el   = document.createElement('button');
    el.id = 'ach-trigger';
    el.className = 'ach-trigger ach-trigger--' + pos;
    el.setAttribute('aria-label','成就系統');
    el.setAttribute('title','成就');
    el.style.color  = this._theme.triggerColor;
    el.style.width  = size;
    el.style.height = size;
    el.innerHTML = '<i class="bi bi-award-fill ach-trigger-icon"></i>'
      + '<span class="ach-trigger-badge" id="ach-badge" style="background:'+this._theme.accent+';color:'+this._theme.accentText+'">0</span>';
    var self = this;
    el.addEventListener('click', function(){ self.togglePanel(); });
    document.body.appendChild(el);
    this._triggerEl = el;
  };

  // ── Panel ──────────────────────────────────────────────────────────
  AchievementSystem.prototype._buildPanel = function() {
    var side  = this.cfg.panelSide === 'left' ? 'left' : 'right';
    var width = (this.cfg.panelWidth || 280) + 'px';
    var el    = document.createElement('aside');
    el.id = 'ach-panel';
    el.className = 'ach-panel ach-panel--' + side;
    el.style.width = width;
    el.setAttribute('role','dialog'); el.setAttribute('aria-modal','false'); el.setAttribute('aria-label','成就清單');
    var self=this;
    document.addEventListener('click',function(e){
      if (self._panelOpen&&self._panelEl&&!self._panelEl.contains(e.target)&&!(self._triggerEl&&self._triggerEl.contains(e.target)))
        self.hidePanel();
    });
    document.body.appendChild(el);
    this._panelEl=el;
    this._refreshPanel();
  };

  AchievementSystem.prototype._refreshPanel = function() {
    if (!this._panelEl) return;
    var th=this._theme;
    var total=this._achievements.length;
    var ul=this._achievements.filter(function(a){return a._unlocked;}).length;
    var pct=total?Math.round(ul/total*100):0;

    var badge=document.getElementById('ach-badge');
    if (badge) { badge.textContent=ul; badge.style.background=th.accent; badge.style.color=th.accentText; }
    if (this._triggerEl) { if(ul>0)this._triggerEl.classList.add('has-items'); }

    this._panelEl.style.background = th.panelBg;
    this._panelEl.style.borderColor = th.panelBorder;

    var self=this;
    this._panelEl.innerHTML=''
      +'<header class="ach-panel-hdr" style="border-color:'+th.panelBorder+'">'
        +'<span class="ach-panel-title" style="color:'+th.headerColor+';font-size:'+this._fs('panelTitle')+'">'
          +'<i class="bi bi-award-fill" style="color:'+th.accent+'"></i> 成就</span>'
        +'<div class="ach-panel-controls">'
          +'<button class="ach-icon-btn" id="ach-toggle-list" title="'+(this.cfg.showList?'隱藏清單':'顯示清單')+'">'
            +'<i class="bi '+(this.cfg.showList?'bi-eye':'bi-eye-slash')+'"></i></button>'
          +'<button class="ach-icon-btn" id="ach-close-btn" title="關閉"><i class="bi bi-x-lg"></i></button>'
        +'</div>'
      +'</header>'
      +'<div class="ach-progress-track" style="background:'+th.panelBorder+'">'
        +'<div class="ach-progress-fill" style="width:'+pct+'%;background:'+th.progressBg+'"></div>'
      +'</div>'
      +'<div class="ach-prog-label" style="font-size:'+this._fs('progressLabel')+'">'
        +'<span style="color:'+th.accent+'">'+ul+'</span>'
        +'<span style="color:#5a5b58"> / '+total+'</span>'
        +'<span class="ach-prog-pct" style="color:'+th.accent+'">'+pct+'%</span>'
      +'</div>'
      +(this.cfg.showList ? this._renderList() : '<div class="ach-hidden-msg"><i class="bi bi-eye-slash"></i><span>成就清單已隱藏</span></div>');

    var closeBtn=document.getElementById('ach-close-btn');
    if (closeBtn) closeBtn.addEventListener('click',function(){ self.hidePanel(); });
    var toggleBtn=document.getElementById('ach-toggle-list');
    if (toggleBtn) toggleBtn.addEventListener('click',function(){ self.setShowList(!self.cfg.showList); });
  };

  AchievementSystem.prototype._renderList = function() {
    if (!this._achievements.length) return '<div class="ach-empty">尚無成就設定</div>';
    var ul=this._achievements.filter(function(a){return  a._unlocked;});
    var lk=this._achievements.filter(function(a){return !a._unlocked;});
    var th=this._theme, self=this;
    var html='<div class="ach-list-wrap">';
    if (ul.length) {
      html+='<div class="ach-group-hdr" style="font-size:'+this._fs('panelMeta')+'">'
        +'<i class="bi bi-check-circle-fill" style="color:'+th.accent+'"></i> 已解鎖（'+ul.length+'）</div>';
      ul.forEach(function(a){ html+=self._renderItem(a); });
    }
    if (lk.length) {
      html+='<div class="ach-group-hdr" style="font-size:'+this._fs('panelMeta')+';margin-top:4px">'
        +'<i class="bi bi-lock-fill" style="color:#5a5b58"></i> 未解鎖（'+lk.length+'）</div>';
      lk.forEach(function(a){ html+=self._renderItem(a); });
    }
    return html+'</div>';
  };

  AchievementSystem.prototype._renderItem = function(a) {
    var r=this._r(a.rarity||'common');
    if (!a._unlocked&&a.secret)
      return '<div class="ach-item ach-item--secret">'
        +'<div class="ach-item-icon" style="border-color:#181918;color:#1e1f1e"><i class="bi bi-question-lg"></i></div>'
        +'<div class="ach-item-body"><div class="ach-item-title" style="color:#4a4b48;font-size:'+this._fs('panelItem')+'">??? 隱藏成就</div></div>'
        +'</div>';
    var isSpoiler=!a._unlocked&&!!a.spoiler;
    var icon  = isSpoiler?'bi-shield-lock-fill':(a.icon||'bi-award');
    var title = isSpoiler?'???':(a.title||a.id);
    var desc  = isSpoiler?'達成後揭曉…':(a.desc||'');
    var lockIcon= !a._unlocked?'<i class="bi bi-lock-fill" style="font-size:.55rem;color:#5a5b58;margin-left:3px"></i>':'';
    return '<div class="ach-item '+(a._unlocked?'ach-item--unlocked':'ach-item--locked')+'" data-id="'+a.id+'" role="listitem">'
      +'<div class="ach-item-icon" style="border-color:'+(a._unlocked?r.color:'#242524')+';'
        +'color:'+(a._unlocked?r.color:'#5a5b58')+';'
        +'box-shadow:'+(a._unlocked?'0 0 12px '+r.glow:'none')+'"><i class="bi '+icon+'"></i></div>'
      +'<div class="ach-item-body">'
        +'<div class="ach-item-title" style="color:'+(a._unlocked?'#c6c7bd':'#7a7b78')+';font-size:'+this._fs('panelItem')+'">'+title+lockIcon+'</div>'
        +(desc?'<div class="ach-item-desc" style="color:'+(a._unlocked?'#8a8b88':'#5a5b58')+';font-size:'+this._fs('panelDesc')+'">'+desc+'</div>':'')
        +'<div class="ach-item-meta" style="font-size:'+this._fs('panelMeta')+'">'
          +'<span class="ach-rarity" style="color:'+r.color+'">'+r.label+'</span>'
          +(a._unlocked&&a._unlockedAt?'<span class="ach-time">'+this._fmtTime(a._unlockedAt)+'</span>':'')
          +(a.reward&&a._unlocked?'<span class="ach-reward"><i class="bi bi-gift-fill"></i> '+a.reward+'</span>':'')
        +'</div>'
      +'</div>'
      +'</div>';
  };

  // ── Toast ──────────────────────────────────────────────────────────
  AchievementSystem.prototype._buildToasts = function() {
    var el  = document.createElement('div');
    el.id   = 'ach-toasts';
    el.className = 'ach-toasts';
    // Apply toastWidth and toastPosition via inline style
    var w   = (this.cfg.toastWidth || 270) + 'px';
    var pos = this.cfg.toastPosition || 'top-right';
    el.style.width = w;
    // Position mapping
    var posMap = {
      'top-right':    'top:60px;right:16px;bottom:auto;left:auto;',
      'top-left':     'top:60px;left:16px;bottom:auto;right:auto;',
      'bottom-right': 'bottom:80px;right:16px;top:auto;left:auto;',
      'bottom-left':  'bottom:80px;left:16px;top:auto;right:auto;',
    };
    el.style.cssText += posMap[pos] || posMap['top-right'];
    document.body.appendChild(el);
    this._toastEl = el;
  };

  AchievementSystem.prototype._showToast = function(a) {
    if (!this._toastEl) return;
    var r  = this._r(a.rarity || 'common'), th = this._theme;
    var toast = document.createElement('div');
    toast.className = 'ach-toast';
    toast.style.borderLeftColor = r.color;
    toast.style.background      = th.panelBg;
    toast.style.borderColor     = th.toastBorder;
    toast.style.borderLeftColor = r.color;
    toast.innerHTML = ''
      + '<div class="ach-toast-icon" style="color:'+r.color+';border-color:'+r.color+'">'
        + '<i class="bi '+(a.icon||'bi-award-fill')+'"></i></div>'
      + '<div class="ach-toast-body">'
        + '<div class="ach-toast-eyebrow" style="font-size:'+this._fs('toastEyebrow')+'">'
          + '<span>成就解鎖</span><span class="ach-toast-rarity" style="color:'+r.color+'">'+r.label+'</span></div>'
        + '<div class="ach-toast-title" style="color:'+r.color+';font-size:'+this._fs('toastTitle')+'">'+(a.title||a.id)+'</div>'
        + (a.desc   ? '<div class="ach-toast-desc"   style="font-size:'+this._fs('toastDesc')+'">'+a.desc+'</div>'   : '')
        + (a.reward ? '<div class="ach-toast-reward" style="font-size:'+this._fs('toastDesc')+'"><i class="bi bi-gift-fill"></i> '+a.reward+'</div>' : '')
      + '</div>';
    this._toastEl.appendChild(toast);
    requestAnimationFrame(function(){ requestAnimationFrame(function(){ toast.classList.add('ach-toast--show'); }); });
    // toastDuration: per-rarity map or single number
    var durCfg = this.cfg.toastDuration;
    var dur;
    if (typeof durCfg === 'number') {
      dur = durCfg;
    } else {
      var map = deepMerge({}, _D.toastDuration, durCfg || {});
      dur = map[a.rarity || 'common'] || 3200;
    }
    setTimeout(function(){
      toast.classList.remove('ach-toast--show');
      setTimeout(function(){ toast.remove(); }, 420);
    }, dur);
  };

  AchievementSystem.prototype._syncPanel = function() {
    if (!this._panelEl) return;
    if (this._panelOpen) this._panelEl.classList.add('ach-panel--open');
    else this._panelEl.classList.remove('ach-panel--open');
    this._refreshPanel();
  };

  AchievementSystem.prototype._fmtTime = function(d) {
    return d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  };

  // ── Static CSS ─────────────────────────────────────────────────────

      +'.ach-panel--left{left:0;border-right:1px solid;transform:translateX(-100%);}'
      +'.ach-panel--open{transform:translateX(0);box-shadow:-8px 0 40px rgba(0,0,0,.7);}'
      +'.ach-panel--left.ach-panel--open{box-shadow:8px 0 40px rgba(0,0,0,.7);}'
      +'.ach-panel-hdr{padding:13px 14px 10px;border-bottom:1px solid;'
        +'display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}'

    document.head.appendChild(s);

  G.AchievementSystem = AchievementSystem;

  // ╔═══════════════════════════════════════════════════════════════════╗
  // ║  Declarative HTML API                                             ║
  // ║                                                                   ║
  // ║  <ach-system                                                      ║
  // ║    theme="ocean"                                                  ║
  // ║    show-list                          (boolean attr, presence=true)║
  // ║    hide-list                          (boolean attr)              ║
  // ║    trigger-pos="bottom-left"                                      ║
  // ║    panel-side="right"                                             ║
  // ║    scale="1.1"                                                    ║
  // ║    var="ach">                         (global var name, default "ach")
  // ║                                                                   ║
  // ║    <ach-item                                                      ║
  // ║      id="my-ach"                                                  ║
  // ║      icon="bi-star-fill"                                          ║
  // ║      title="成就名稱"                                              ║
  // ║      rarity="rare"                                                ║
  // ║      reward="+ 1 點"                                              ║
  // ║      spoiler                          (boolean attr)              ║
  // ║      secret>                          (boolean attr)              ║
  // ║      成就描述文字放在內容裡。                                        ║
  // ║    </ach-item>                                                    ║
  // ║                                                                   ║
  // ║  </ach-system>                                                    ║
  // ║                                                                   ║
  // ║  Unlock from any element:                                         ║
  // ║    <button data-ach-unlock="my-ach">完成</button>                 ║
  // ║    <button data-ach-unlock="a1,a2,a3">批次解鎖</button>           ║
  // ║                                                                   ║
  // ║  Or from JS (the instance is stored in the var you specify):      ║
  // ║    ach.unlock('my-ach');                                          ║
  // ╚═══════════════════════════════════════════════════════════════════╝
  function _parseBool(el, attr) {
    return el.hasAttribute(attr);
  }

  function _parseAchItems(container) {
    var items = container.querySelectorAll('ach-item');
    var result = [];
    items.forEach(function(el) {
      var a = {
        id:      el.getAttribute('id')     || ('ach-' + Math.random().toString(36).slice(2,7)),
        icon:    el.getAttribute('icon')   || 'bi-award-fill',
        title:   el.getAttribute('title')  || '未命名成就',
        rarity:  el.getAttribute('rarity') || 'common',
        desc:    el.textContent.trim(),
        reward:  el.getAttribute('reward') || undefined,
        spoiler: _parseBool(el, 'spoiler'),
        secret:  _parseBool(el, 'secret'),
        // Manual achievements: condition always false, unlock via .unlock(id)
        condition: function() { return false; },
      };
      // Pass reward flag for onUnlock handler convenience
      if (a.reward) a._reward = true;
      result.push(a);
    });
    return result;
  }

  function _initDeclarative() {
    var containers = document.querySelectorAll('ach-system');
    containers.forEach(function(el) {
      // Hide the raw tag content
      el.style.display = 'none';

      // Parse options from attributes
      var showList = !_parseBool(el, 'hide-list');

      // toastDuration: accepts single number "3000" or per-rarity JSON '{"legendary":5000}'
      var toastDurRaw = el.getAttribute('toast-duration');
      var toastDur;
      if (toastDurRaw) {
        var parsed = parseFloat(toastDurRaw);
        toastDur = isNaN(parsed) ? JSON.parse(toastDurRaw) : parsed;
      }

      // rarityLabels: JSON string '{"common":"C","rare":"R","epic":"E","legendary":"L"}'
      var rarityRaw = el.getAttribute('rarity-labels');
      var rarityLabels = rarityRaw ? JSON.parse(rarityRaw) : undefined;

      var opts = {
        themeName:     el.getAttribute('theme')          || 'default',
        showList:      showList,
        triggerPos:    el.getAttribute('trigger-pos')    || 'bottom-left',
        panelSide:     el.getAttribute('panel-side')     || 'right',
        panelWidth:    parseInt(el.getAttribute('panel-width'))    || 280,
        triggerSize:   parseInt(el.getAttribute('trigger-size'))   || 46,
        toastWidth:    parseInt(el.getAttribute('toast-width'))    || 270,
        toastPosition: el.getAttribute('toast-position') || 'top-right',
        scale:         parseFloat(el.getAttribute('scale'))        || 1,
        achievements:  _parseAchItems(el),
      };
      if (toastDur    !== undefined) opts.toastDuration  = toastDur;
      if (rarityLabels !== undefined) opts.rarityLabels  = rarityLabels;

      // onUnlock: reward handling built-in
      opts.onUnlock = function(a) {
        if (a._reward && a.reward) {
          var bonus = parseInt(a.reward);
          if (!isNaN(bonus) && bonus > 0) {
            // Dispatch a custom event so host page can react
            document.dispatchEvent(new CustomEvent('ach:reward', {
              detail: { id: a.id, bonus: bonus, achievement: a }
            }));
          }
        }
        // Dispatch generic unlock event
        document.dispatchEvent(new CustomEvent('ach:unlock', {
          detail: { id: a.id, achievement: a }
        }));
      };

      var instance = new AchievementSystem(opts);

      // Expose instance as global var (default: "ach", customisable via var="myAch")
      var varName = el.getAttribute('var') || 'ach';
      G[varName] = instance;

      // Expose on element itself too
      el._achInstance = instance;
    });

    // Wire up data-ach-unlock triggers (works for dynamically added ones too via delegation)
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('[data-ach-unlock]');
      if (!btn) return;
      var ids = btn.getAttribute('data-ach-unlock')
        .split(',').map(function(s){ return s.trim(); }).filter(Boolean);
      var containers = document.querySelectorAll('ach-system');
      ids.forEach(function(id) {
        containers.forEach(function(el) {
          if (el._achInstance) el._achInstance.unlock(id);
        });
      });
    });

    // Init ach-quiz elements
    _initQuiz();
  }

  // ── ach-quiz CSS (injected once) ──────────────────────────────────
  function _injectQuizCSS() {
    if (document.getElementById('ach-quiz-css')) return;
    var s = document.createElement('style');
    s.id = 'ach-quiz-css';
    s.textContent = ''
      +'.ach-quiz{display:flex;flex-direction:column;gap:8px;padding:16px 18px;'
        +'border-radius:10px;border:1px solid;margin:8px 0;}'
      +'.ach-quiz--done .ach-quiz-input{opacity:.5;}'
      +'.ach-quiz-question{font-size:.85rem;line-height:1.55;font-family:\'Exo 2\',sans-serif;}'
      +'.ach-quiz-hint{font-size:.7rem;font-family:\'Share Tech Mono\',monospace;'
        +'opacity:.7;margin-top:-4px;}'
      +'.ach-quiz-row{display:flex;gap:8px;align-items:center;}'
      +'.ach-quiz-input{'
        +'flex:1;background:#0c0d0c;border:1.5px solid;border-radius:6px;'
        +'padding:7px 11px;font-size:.82rem;font-family:\'Exo 2\',sans-serif;'
        +'color:#c6c7bd;outline:none;transition:border-color .18s,box-shadow .18s;}'
      +'.ach-quiz-input:focus{box-shadow:0 0 0 2px;}'
      +'.ach-quiz-input:disabled{cursor:not-allowed;}'
      +'.ach-quiz-btn{'
        +'display:inline-flex;align-items:center;gap:6px;'
        +'padding:7px 14px;border-radius:6px;border:1.5px solid;'
        +'font-size:.8rem;font-weight:700;font-family:\'Exo 2\',sans-serif;'
        +'cursor:pointer;transition:filter .15s,transform .1s;white-space:nowrap;'
        +'background:#0c0d0c;}'
      +'.ach-quiz-btn:hover:not(:disabled){filter:brightness(1.25);}'
      +'.ach-quiz-btn:active:not(:disabled){transform:scale(.96);}'
      +'.ach-quiz-btn:disabled{opacity:.4;cursor:not-allowed;}'
      +'.ach-quiz-feedback{'
        +'font-size:.75rem;font-family:\'Share Tech Mono\',monospace;'
        +'display:flex;align-items:center;gap:5px;min-height:1.2em;'
        +'transition:opacity .2s;}'
      +'.ach-quiz-feedback i{font-size:.8rem;}';
    document.head.appendChild(s);
  }

  // ── Resolve ach instance for a quiz element ───────────────────────
  // Priority: var attr on quiz → var attr on nearest ach-system → 'ach'
  function _resolveInstance(quizEl) {
    var varName = quizEl.getAttribute('var');
    if (varName && G[varName]) return G[varName];
    var sys = quizEl.closest('ach-system');
    if (sys && sys._achInstance) return sys._achInstance;
    // Walk up DOM to find any ach-system ancestor
    var parent = quizEl.parentElement;
    while (parent) {
      if (parent.tagName && parent.tagName.toLowerCase() === 'ach-system' && parent._achInstance)
        return parent._achInstance;
      parent = parent.parentElement;
    }
    // Fall back to default global 'ach'
    return G['ach'] || null;
  }

  // ── Build one quiz element ────────────────────────────────────────
  function _buildQuiz(el) {
    /*
     * Attributes:
     *   question      the question text (or use element text content)
     *   answer        single correct answer
     *   answers       comma-separated list of accepted answers
     *   ach-id        achievement id to unlock on correct answer
     *   placeholder   input placeholder  (default '輸入答案')
     *   btn-text      button label       (default '核對')
     *   hint          hint shown below question
     *   case-sensitive  boolean attr, default false
     *   var           override ach instance global var name
     */
    var question      = el.getAttribute('question')    || el.textContent.trim();
    var achId         = el.getAttribute('ach-id')      || '';
    var placeholder   = el.getAttribute('placeholder') || '輸入答案';
    var btnText       = el.getAttribute('btn-text')    || '核對';
    var hint          = el.getAttribute('hint')        || '';
    var caseSensitive = _parseBool(el, 'case-sensitive');

    // Build accepted answers list
    var raw = el.getAttribute('answers') || el.getAttribute('answer') || '';
    var accepted = raw.split(',').map(function(s){ return s.trim(); }).filter(Boolean);

    // Get theme colours from linked instance
    var instance = _resolveInstance(el);
    var th = (instance && instance._theme) ? instance._theme : _THEMES['default'];
    var accent      = th.accent      || '#C8DD5A';
    var panelBorder = th.panelBorder || '#1e1f1e';
    var panelBg     = th.panelBg     || '#0e0f0e';
    var headerColor = th.headerColor || '#c6c7bd';

    // Build wrapper div that replaces the tag
    var wrap = document.createElement('div');
    wrap.className = 'ach-quiz';
    wrap.style.cssText = 'background:'+panelBg+';border-color:'+panelBorder+';';

    // Question
    var qEl = document.createElement('p');
    qEl.className = 'ach-quiz-question';
    qEl.style.color = headerColor;
    qEl.textContent = question;
    wrap.appendChild(qEl);

    // Hint
    if (hint) {
      var hEl = document.createElement('p');
      hEl.className = 'ach-quiz-hint';
      hEl.style.color = accent;
      hEl.textContent = hint;
      wrap.appendChild(hEl);
    }

    // Input + button row
    var row = document.createElement('div');
    row.className = 'ach-quiz-row';

    var input = document.createElement('input');
    input.className = 'ach-quiz-input';
    input.type = 'text';
    input.placeholder = placeholder;
    input.setAttribute('autocomplete', 'off');
    input.style.borderColor = panelBorder;
    input.style.setProperty('--focus-color', accent + '55');
    // Focus glow using inline style trick
    input.addEventListener('focus',  function(){ this.style.borderColor=accent; this.style.boxShadow='0 0 0 2px '+accent+'33'; });
    input.addEventListener('blur',   function(){ this.style.borderColor=panelBorder; this.style.boxShadow=''; });

    var btn = document.createElement('button');
    btn.className = 'ach-quiz-btn';
    btn.style.cssText = 'color:'+accent+';border-color:'+accent+';';
    btn.innerHTML = '<i class="bi bi-check2"></i>' + btnText;

    row.appendChild(input);
    row.appendChild(btn);
    wrap.appendChild(row);

    // Feedback line
    var fb = document.createElement('div');
    fb.className = 'ach-quiz-feedback';
    wrap.appendChild(fb);

    // Check logic
    function doCheck() {
      if (btn.disabled) return;
      var val = input.value.trim();
      if (!val) return;

      var compare = caseSensitive
        ? function(a, b){ return a === b; }
        : function(a, b){ return a.toLowerCase() === b.toLowerCase(); };

      var correct = accepted.some(function(ans){ return compare(val, ans); });

      if (correct) {
        // Success state
        fb.innerHTML = '<i class="bi bi-check-circle-fill" style="color:'+accent+'"></i>'
          + '<span style="color:'+accent+'">正確！</span>';
        input.disabled = true;
        btn.disabled   = true;
        wrap.classList.add('ach-quiz--done');
        wrap.style.borderColor = accent;
        if (instance && achId) instance.unlock(achId);
        // Dispatch event
        document.dispatchEvent(new CustomEvent('ach:quiz-correct', {
          detail: { achId: achId, value: val, element: wrap }
        }));
      } else {
        // Wrong state
        fb.innerHTML = '<i class="bi bi-x-circle-fill" style="color:#F08080"></i>'
          + '<span style="color:#F08080">再試試看</span>';
        input.style.borderColor = '#F08080';
        setTimeout(function(){
          input.style.borderColor = panelBorder;
          fb.innerHTML = '';
        }, 1400);
        document.dispatchEvent(new CustomEvent('ach:quiz-wrong', {
          detail: { achId: achId, value: val, element: wrap }
        }));
      }
    }

    btn.addEventListener('click', doCheck);
    input.addEventListener('keydown', function(e){
      if (e.key === 'Enter') doCheck();
    });

    // Replace the original tag in DOM
    el.parentNode.replaceChild(wrap, el);
  }

  // ── Init all ach-quiz elements ────────────────────────────────────
  function _initQuiz() {
    _injectQuizCSS();
    // Collect first (replaceChild invalidates live NodeList)
    var quizEls = Array.prototype.slice.call(document.querySelectorAll('ach-quiz'));
    quizEls.forEach(function(el) { _buildQuiz(el); });
  }

  // Auto-init
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _initDeclarative);
  } else {
    _initDeclarative();
  }

})(window);
</script>

    var saved = JSON.parse(raw);
    if(saved.system)       state.system       = Object.assign({}, state.system, saved.system);
    if(saved.achievements) state.achievements = saved.achievements;
  }catch(e){} }
  buildThemeGrid();
  populateForm();
  renderAchList();
  renderCode();
  renderTestGrid();
  rebuildPreview();
}

function saveState(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    var dot = document.getElementById('saved-dot');
    dot.classList.add('show');
    clearTimeout(saveState._t);
    saveState._t = setTimeout(function(){ dot.classList.remove('show'); }, 1200);
  }catch(e){}
}

/* ─── Theme Grid ────────────────────────────────── */
function buildThemeGrid(){
  var grid = document.getElementById('theme-grid');
  grid.innerHTML = '';
  Object.keys(THEMES).forEach(function(name){
    var t   = THEMES[name];
    var wrap= document.createElement('div'); wrap.className='theme-swatch-wrap';
    var sw  = document.createElement('button');
    sw.className = 'theme-swatch'+(state.system.theme===name?' active':'');
    sw.title     = t.lbl;
    sw.setAttribute('data-theme', name);
    sw.style.cssText = 'background:linear-gradient(135deg,'+t.a+','+t.b+');';
    sw.onclick = function(){
      state.system.theme = name;
      document.querySelectorAll('.theme-swatch').forEach(function(s){ s.classList.remove('active'); });
      sw.classList.add('active');
      onSettingChange();
    };
    var lbl = document.createElement('div');
    lbl.className = 'theme-swatch-label'; lbl.textContent = t.lbl;
    wrap.appendChild(sw); wrap.appendChild(lbl);
    grid.appendChild(wrap);
  });
}

/* ─── Form ──────────────────────────────────────── */
function populateForm(){
  var s = state.system;
  setv('s-triggerPos',   s.triggerPos);
  setv('s-triggerSize',  s.triggerSize);
  setv('s-panelSide',    s.panelSide);
  setv('s-panelWidth',   s.panelWidth);
  setv('s-toastPosition',s.toastPosition);
  setv('s-toastWidth',   s.toastWidth);
  setv('s-scale',        s.scale);
  document.getElementById('s-showList').checked = s.showList;
  var td = s.toastDuration;
  setv('s-toastDuration',    typeof td==='number'?td:(td.common    ||3200));
  setv('s-toastDurationLeg', typeof td==='number'?td:(td.legendary ||4500));
  var rl = s.rarityLabels||{};
  setv('rl-common',    rl.common    ||'普通');
  setv('rl-rare',      rl.rare      ||'稀有');
  setv('rl-epic',      rl.epic      ||'史詩');
  setv('rl-legendary', rl.legendary ||'傳說');
}

function setv(id,v){ var el=document.getElementById(id); if(el) el.value=v; }
function gv(id,fb){  var el=document.getElementById(id); return el?el.value:(fb||''); }
function gi(id,fb){  return parseInt(gv(id))||fb; }
function gf(id,fb){  return parseFloat(gv(id))||fb; }

function readForm(){
  var s = state.system;
  s.triggerPos      = gv('s-triggerPos','bottom-right');
  s.triggerSize     = gi('s-triggerSize',46);
  s.panelSide       = gv('s-panelSide','right');
  s.panelWidth      = gi('s-panelWidth',280);
  s.toastPosition   = gv('s-toastPosition','top-right');
  s.toastWidth      = gi('s-toastWidth',270);
  s.scale           = gf('s-scale',1);
  s.showList        = document.getElementById('s-showList').checked;
  var dur    = gi('s-toastDuration',3200);
  var durLeg = gi('s-toastDurationLeg',4500);
  s.toastDuration   = { common:dur, rare:dur, epic:dur, legendary:durLeg };
  s.rarityLabels    = {
    common:   gv('rl-common',   '普通'),
    rare:     gv('rl-rare',     '稀有'),
    epic:     gv('rl-epic',     '史詩'),
    legendary:gv('rl-legendary','傳說'),
  };
}

function onSettingChange(){
  readForm();
  saveState();
  renderCode();
  clearTimeout(rebuildTimer);
  rebuildTimer = setTimeout(rebuildPreview, 380);
}

/* ─── Achievement List ──────────────────────────── */
function renderAchList(){
  var list  = document.getElementById('ach-list');
  var badge = document.getElementById('ach-count');
  badge.textContent = '('+state.achievements.length+')';

  if(!state.achievements.length){
    list.innerHTML = '<div class="empty-hint">尚無成就 — 點擊「新增成就」開始</div>';
    return;
  }
  list.innerHTML = '';

  state.achievements.forEach(function(a, idx){
    var rc    = RARITY_COLORS[a.rarity]||'#c6c7bd';
    var rLabel= (state.system.rarityLabels||{})[a.rarity]||a.rarity;
    var flags = '';
    if(a.spoiler) flags += '<span class="badge" style="color:#C8DD5A;border-color:#C8DD5A55">spoiler</span>';
    if(a.secret)  flags += '<span class="badge" style="color:#F08080;border-color:#F0808055">secret</span>';
    if(a.reward)  flags += '<span class="badge" style="color:#81E6D9;border-color:#81E6D955">'+esc(a.reward)+'</span>';

    var card = document.createElement('div');
    card.className = 'ach-card';
    card.setAttribute('draggable','true');
    card.innerHTML  = '<div class="ach-icon" style="border-color:'+rc+';color:'+rc+'">'
                    +   '<i class="bi '+(a.icon||'bi-award-fill')+'"></i></div>'
                    + '<div class="ach-body">'
                    +   '<div class="ach-name">'+esc(a.title||'未命名')+'</div>'
                    +   '<div class="ach-meta">'
                    +     '<span class="badge" style="color:'+rc+';border-color:'+rc+'55">'+esc(rLabel)+'</span>'
                    +     flags
                    +   '</div>'
                    + '</div>'
                    + '<div class="ach-actions">'
                    +   '<button class="btn btn-sm" title="編輯" onclick="openModal('+idx+')">'
                    +     '<i class="bi bi-pencil"></i></button>'
                    +   '<button class="btn btn-sm btn-danger" title="刪除" onclick="deleteAch('+idx+')">'
                    +     '<i class="bi bi-trash3"></i></button>'
                    + '</div>';

    // Drag-to-reorder
    card.addEventListener('dragstart',function(e){ e.dataTransfer.setData('text/plain',idx); card.style.opacity='.35'; });
    card.addEventListener('dragend',  function(){   card.style.opacity=''; card.classList.remove('drag-over'); });
    card.addEventListener('dragover', function(e){ e.preventDefault(); card.classList.add('drag-over'); });
    card.addEventListener('dragleave',function(){   card.classList.remove('drag-over'); });
    card.addEventListener('drop',     function(e){
      e.preventDefault(); card.classList.remove('drag-over');
      var from = parseInt(e.dataTransfer.getData('text/plain')), to = idx;
      if(from===to) return;
      var item = state.achievements.splice(from,1)[0];
      state.achievements.splice(to,0,item);
      saveState(); renderAchList(); renderCode(); renderTestGrid(); clearTimeout(rebuildTimer); rebuildTimer=setTimeout(rebuildPreview,380);
    });

    list.appendChild(card);
  });
}

/* ─── Modal ─────────────────────────────────────── */
function openModal(idx){
  editingIndex = (idx===null)?-1:idx;
  var a = editingIndex>=0 ? state.achievements[editingIndex] : {};
  document.getElementById('modal-title-text').textContent = editingIndex>=0?'編輯成就':'新增成就';
  setv('m-id',     a.id    ||'');
  setv('m-icon',   a.icon  ||'bi-award-fill');
  setv('m-title',  a.title ||'');
  setv('m-desc',   a.desc  ||'');
  setv('m-rarity', a.rarity||'common');
  setv('m-reward', a.reward||'');
  document.getElementById('m-spoiler').checked = !!a.spoiler;
  document.getElementById('m-secret').checked  = !!a.secret;
  clearErr();
  updateIconPreview();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('m-id').focus(); }, 60);
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
}

function onOverlayClick(e){
  if(e.target===document.getElementById('modal-overlay')) closeModal();
}

function clearErr(){
  document.getElementById('err-id').classList.remove('show');
  document.getElementById('err-title').classList.remove('show');
}

function updateIconPreview(){
  var icon   = (document.getElementById('m-icon').value.trim()||'bi-award-fill');
  var rarity = document.getElementById('m-rarity').value;
  var color  = RARITY_COLORS[rarity]||'#c6c7bd';
  document.getElementById('icon-preview-box').style.borderColor = color+'66';
  var ic = document.getElementById('icon-preview-i');
  ic.className   = 'bi '+icon;
  ic.style.color = color;
}

function saveAchievement(){
  var id    = gv('m-id').trim();
  var title = gv('m-title').trim();
  var ok    = true;
  if(!id){
    document.getElementById('err-id').classList.add('show'); ok=false;
  }
  // Check duplicate id
  var dup = state.achievements.some(function(a,i){ return a.id===id && i!==editingIndex; });
  if(dup){
    document.getElementById('err-id').textContent='ID 已存在，請換一個';
    document.getElementById('err-id').classList.add('show'); ok=false;
  }
  if(!title){
    document.getElementById('err-title').classList.add('show'); ok=false;
  }
  if(!ok) return;

  var reward = gv('m-reward').trim();
  var a = {
    id:     id,
    icon:   gv('m-icon').trim()||'bi-award-fill',
    title:  title,
    desc:   gv('m-desc').trim(),
    rarity: gv('m-rarity','common'),
    spoiler:document.getElementById('m-spoiler').checked,
    secret: document.getElementById('m-secret').checked,
  };
  if(reward) a.reward = reward;
  if(!a.desc)    delete a.desc;

  if(editingIndex>=0) state.achievements[editingIndex]=a;
  else                state.achievements.push(a);

  closeModal();
  saveState();
  renderAchList();
  renderCode();
  renderTestGrid();
  clearTimeout(rebuildTimer);
  rebuildTimer = setTimeout(rebuildPreview, 380);
}

function deleteAch(idx){
  state.achievements.splice(idx,1);
  saveState();
  renderAchList();
  renderCode();
  renderTestGrid();
  clearTimeout(rebuildTimer);
  rebuildTimer = setTimeout(rebuildPreview, 380);
}

/* ─── Code Generation ───────────────────────────── */
function buildCode(highlight){
  var s   = state.system;
  var td  = s.toastDuration||{};
  var dur = typeof td==='number'?td:(td.common||3200);
  var leg = typeof td==='number'?td:(td.legendary||4500);
  var rl  = s.rarityLabels||{};
  var defRL = {common:'普通',rare:'稀有',epic:'史詩',legendary:'傳說'};
  var rlChanged = Object.keys(defRL).some(function(k){ return (rl[k]||defRL[k])!==defRL[k]; });

  function t(s){ return highlight?'<span class="ct">'+s+'</span>':s; }
  function a(s){ return highlight?'<span class="ca">'+s+'</span>':s; }
  function v(s){ return highlight?'<span class="cv">'+s+'</span>':s; }
  function c(s){ return highlight?'<span class="cc">'+s+'</span>':s; }
  function hesc(s){ return highlight?esc(s):s; }

  var lines=[];
  lines.push(t('<ach-system'));
  lines.push('  '+a('theme')+'='+v('"'+s.theme+'"'));
  lines.push('  '+(s.showList?a('show-list'):a('hide-list')));
  lines.push('  '+a('trigger-pos')+'='+v('"'+s.triggerPos+'"'));
  if(s.triggerSize!==46)  lines.push('  '+a('trigger-size')+'='+v('"'+s.triggerSize+'"'));
  lines.push('  '+a('panel-side')+'='+v('"'+s.panelSide+'"'));
  if(s.panelWidth!==280)  lines.push('  '+a('panel-width')+'='+v('"'+s.panelWidth+'"'));
  lines.push('  '+a('toast-position')+'='+v('"'+s.toastPosition+'"'));
  if(s.toastWidth!==270)  lines.push('  '+a('toast-width')+'='+v('"'+s.toastWidth+'"'));
  if(dur!==3200||leg!==4500)
    lines.push('  '+a('toast-duration')+'='+v("'"+JSON.stringify({common:dur,rare:dur,epic:dur,legendary:leg})+"'"));
  if(s.scale!==1)         lines.push('  '+a('scale')+'='+v('"'+s.scale+'"'));
  if(rlChanged)           lines.push('  '+a('rarity-labels')+'='+v("'"+JSON.stringify(rl)+"'"));
  lines.push('  '+a('var')+'='+v('"ach"')+t('>'));
  lines.push('');

  state.achievements.forEach(function(ac){
    var row = '  '+t('<ach-item');
    row += ' '+a('id')+'='+v('"'+hesc(ac.id)+'"');
    row += ' '+a('icon')+'='+v('"'+hesc(ac.icon||'bi-award-fill')+'"');
    row += '\n    '+a('title')+'='+v('"'+hesc(ac.title||'')+'"');
    row += ' '+a('rarity')+'='+v('"'+ac.rarity+'"');
    if(ac.reward)  row += ' '+a('reward')+'='+v('"'+hesc(ac.reward)+'"');
    if(ac.spoiler) row += ' '+a('spoiler');
    if(ac.secret)  row += ' '+a('secret');
    row += t('>');
    if(ac.desc)    row += hesc(ac.desc);
    row += t('</ach-item>');
    lines.push(row);
  });

  lines.push('');
  lines.push(t('</ach-system>'));

  if(state.achievements.length){
    lines.push('');
    lines.push(c('<!-- 解鎖按鈕範例 -->'));
    state.achievements.forEach(function(ac){
      lines.push(t('<button')+' '+a('data-ach-unlock')+'='+v('"'+hesc(ac.id)+'"')+t('>'+hesc(ac.title||ac.id)+'</button>'));
    });
  }
  return lines.join('\n');
}

function renderCode(){
  var pre = document.getElementById('code-block');
  if(!state.achievements.length){
    pre.innerHTML = '<span style="color:var(--text-sec);font-family:\'Share Tech Mono\',monospace">新增成就後程式碼將自動產生…</span>';
    return;
  }
  pre.innerHTML = buildCode(true);
}

function copyCode(){
  var plain = buildCode(false);
  navigator.clipboard.writeText(plain).then(function(){
    var el = document.getElementById('copy-ok');
    el.classList.add('show');
    clearTimeout(copyCode._t);
    copyCode._t = setTimeout(function(){ el.classList.remove('show'); }, 1600);
  }).catch(function(){
    var ta = document.createElement('textarea');
    ta.value = plain;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

/* ─── Live Preview ──────────────────────────────── */
function rebuildPreview(){
  unlocked = {};
  if(achInstance){ try{ achInstance.destroy(); }catch(e){} achInstance=null; }

  var defs = state.achievements.map(function(a){
    return Object.assign({},a,{ condition:function(){return false;}, _reward:false });
  });
  var s = state.system;
  achInstance = new AchievementSystem({
    themeName:    s.theme,
    showList:     s.showList,
    triggerPos:   s.triggerPos,
    triggerSize:  s.triggerSize,
    panelSide:    s.panelSide,
    panelWidth:   s.panelWidth,
    toastPosition:s.toastPosition,
    toastWidth:   s.toastWidth,
    toastDuration:s.toastDuration,
    rarityLabels: s.rarityLabels,
    scale:        s.scale,
    achievements: defs,
    onUnlock:function(a){
      unlocked[a.id]=true;
      addLog('🏆 '+( a.title||a.id));
      renderTestGrid();
    },
  });
  renderTestGrid();
}

function resetPreview(){ rebuildPreview(); }

/* ─── Test Grid ─────────────────────────────────── */
function renderTestGrid(){
  var grid = document.getElementById('test-grid');
  if(!state.achievements.length){
    grid.innerHTML='<span style="font-size:1rem;color:var(--text-sec);font-family:\'Share Tech Mono\',monospace">新增成就後可點擊此處觸發測試</span>';
    return;
  }
  grid.innerHTML='';
  state.achievements.forEach(function(a){
    var done = !!unlocked[a.id];
    var btn  = document.createElement('button');
    btn.className = 'test-btn'+(done?' unlocked':'');
    btn.disabled  = done;
    var rc = RARITY_COLORS[a.rarity]||'#c6c7bd';
    btn.innerHTML = '<i class="bi '+(a.icon||'bi-award-fill')+'" style="color:'+rc+'"></i> '+esc(a.title||a.id);
    if(!done) btn.onclick=function(){ if(achInstance) achInstance.unlock(a.id); };
    grid.appendChild(btn);
  });
}

/* ─── Log ───────────────────────────────────────── */
function addLog(msg){
  var box = document.getElementById('log-box');
  var d = document.createElement('div'); d.className='log-entry'; d.textContent=msg;
  box.insertBefore(d, box.firstChild);
  while(box.children.length>6) box.lastChild.remove();
}

/* ─── Download ──────────────────────────────────── */
function downloadHTML(){
  var plain  = buildCode(false);
  var achJS  = atob(_ACH_B64);
  var html = [
    '<!DOCTYPE html>',
    '<html lang="zh-TW">',
    '<head>',
    '<meta charset="UTF-8">',
    '<meta name="viewport" content="width=device-width, initial-scale=1.0">',
    '<title>成就頁面</title>',
    '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">',
    '<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">',
    '</head>',
    '<body style="background:#0c0d0c;color:#c6c7bd;font-family:\'Exo 2\',sans-serif;padding:40px 32px;">',
    '',
    '<!-- 成就系統定義 -->',
    plain,
    '',
    '<!-- achievement-system.js -->',
    '<script>',
    achJS,
    '<\/script>',
    '</body>',
    '</html>',
  ].join('\n');

  var blob = new Blob([html],{type:'text/html'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href=url; a.download='achievement-page.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

/* ─── Reset ─────────────────────────────────────── */
function resetAll(){
  // Use a two-click confirm pattern instead of window.confirm
  var btn = event.currentTarget;
  if(btn._confirmPending){
    clearTimeout(btn._t);
    btn._confirmPending = false;
    btn.innerHTML = '<i class="bi bi-trash3"></i> 清除重置';
    btn.style.borderColor=''; btn.style.color='';
    localStorage.removeItem(LS_KEY);
    state = deepClone(DEFAULT_STATE);
    buildThemeGrid(); populateForm(); renderAchList();
    renderCode(); renderTestGrid(); rebuildPreview();
  } else {
    btn._confirmPending = true;
    btn.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> 確認清除？';
    btn.style.borderColor='var(--warning)'; btn.style.color='var(--warning)';
    btn._t = setTimeout(function(){
      btn._confirmPending=false;
      btn.innerHTML='<i class="bi bi-trash3"></i> 清除重置';
      btn.style.borderColor=''; btn.style.color='';
    }, 3600);
  }
}

function esc(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
