<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>list-card.js — 主題總覽</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0c0d0c;
      color: #c6c7bd;
      font-family: system-ui, 'Segoe UI', sans-serif;
      font-size: 0.82rem;
      padding: 36px 28px 60px;
    }
    h1 {
      color: #C8DD5A;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .sub {
      color: #c6c7bd;
      opacity: 0.45;
      font-size: 0.72rem;
      margin-bottom: 40px;
      letter-spacing: 0.04em;
    }
    .group {
      margin-bottom: 40px;
    }
    .group-label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 8px;
      padding-left: 2px;
    }
    .pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .pair-label {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 4px;
      padding-left: 2px;
    }
    card-item h4 {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
      opacity: 0.7;
    }
    card-item p {
      font-size: 0.75rem;
      line-height: 1.5;
    }
    .ctrl {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .ctrl button {
      background: transparent;
      border: 1px solid #c6c7bd33;
      color: #c6c7bd99;
      font-size: 0.62rem;
      padding: 2px 9px;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 0.14s, color 0.14s;
    }
    .ctrl button:hover { border-color: #C8DD5A; color: #C8DD5A; }
  </style>
</head>
<body>

  <h1>list-card.js</h1>
  <p class="sub">品牌色全覽 · 每色各有 default（深底）與 fill（色底）兩個變體 · 點擊虛線展開下一張</p>

  <!-- 動態產生所有主題 -->
  <div id="theme-grid"></div>

  <script src="list-card.js"></script>
  <script>
    const COLORS = [
      'shell', 'lavender', 'special', 'warning',
      'salmon', 'sky', 'safe', 'vanilla',
      'yellow', 'info', 'stone', 'pink', 'orange'
    ]

    const CONTENT = [
      `<h4>第一張</h4><p>框線、文字、虛線<br>均使用品牌色。</p>`,
      `<h4>第二張</h4><p>展開後可繼續<br>點擊虛線。</p>`,
      `<h4>第三張</h4><p>最後一張無虛線。</p>`,
    ]

    const grid = document.getElementById('theme-grid')

    COLORS.forEach(color => {
      const group = document.createElement('div')
      group.className = 'group'
      group.innerHTML = `<div class="group-label">${color}</div>`

      const pair = document.createElement('div')
      pair.className = 'pair'

      ;['default', 'fill'].forEach(variant => {
        const themeName = variant === 'default' ? color : `${color}-fill`
        const col = document.createElement('div')

        const lbl = document.createElement('div')
        lbl.className = 'pair-label'
        lbl.textContent = variant === 'default'
          ? `${color}  （深底·品牌色）`
          : `${color}-fill  （品牌色底·深字）`
        col.appendChild(lbl)

        const id = `lc-${color}-${variant}`
        col.innerHTML += `
          <list-card id="${id}" theme="${themeName}" divider-width="14px" style="min-height:60px">
            <card-item>${CONTENT[0]}</card-item>
            <card-item>${CONTENT[1]}</card-item>
            <card-item>${CONTENT[2]}</card-item>
          </list-card>
          <div class="ctrl">
            <button onclick="document.getElementById('${id}').expandAll()">全部展開</button>
            <button onclick="document.getElementById('${id}').reset()">收回</button>
          </div>
        `
        pair.appendChild(col)
      })

      group.appendChild(pair)
      grid.appendChild(group)
    })
  </script>
</body>
</html>
